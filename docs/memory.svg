<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <rect x="0" y="0" width="1120" height="470" fill="#ffffff"/>

  <text x="560" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#1a1a1a">Memory — typed, consolidated, salience-weighted</text>
  <text x="560" y="64" text-anchor="middle" font-size="13.5" fill="#5a5a5a">Fast working memory during activity; slower structured consolidation while quiet (coordinate 2)</text>

  <defs>
    <style>
      .box { fill:#ffffff; stroke:#c9d6e8; stroke-width:1.5; }
      .accent { fill:#f4f7fb; stroke:#c9d6e8; stroke-width:1.5; }
      .bt { fill:#1a1a1a; font-size:13px; font-weight:600; }
      .bs { fill:#5a5a5a; font-size:11px; }
      .link { stroke:#9fb3cf; stroke-width:2; fill:none; }
      .chip { fill:#eef2f8; stroke:#c9d6e8; stroke-width:1; }
      .lbl { fill:#5a7; font-size:11px; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#9fb3cf"/>
    </marker>
  </defs>

  <!-- A: working -->
  <rect class="box" x="60" y="150" width="250" height="100" rx="9"/>
  <text class="bt" x="185" y="186" text-anchor="middle">Working / short-term</text>
  <text class="bs" x="185" y="206" text-anchor="middle">active context — fast, lossy</text>
  <text class="bs" x="185" y="222" text-anchor="middle">what's in play right now</text>

  <!-- B: consolidation -->
  <rect class="accent" x="420" y="138" width="280" height="124" rx="9"/>
  <text class="bt" x="436" y="166" text-anchor="start">Consolidation — the "sleep" cycle</text>
  <text class="bs" x="436" y="190" text-anchor="start">• extract typed memories</text>
  <text class="bs" x="436" y="208" text-anchor="start">• cluster related material</text>
  <text class="bs" x="436" y="226" text-anchor="start">• distill some as dreams</text>
  <text class="bs" x="436" y="248" text-anchor="start" font-style="italic">runs while quiet, not continuously</text>

  <!-- C: typed memory -->
  <rect class="box" x="800" y="138" width="280" height="124" rx="9"/>
  <text class="bt" x="940" y="166" text-anchor="middle">Persistent typed memory</text>
  <text class="bs" x="940" y="186" text-anchor="middle">structured by type; survives days</text>
  <rect class="chip" x="813" y="200" width="80" height="26" rx="6"/>
  <text class="bs" x="853" y="217" text-anchor="middle">active</text>
  <rect class="chip" x="900" y="200" width="80" height="26" rx="6"/>
  <text class="bs" x="940" y="217" text-anchor="middle">dormant</text>
  <rect class="chip" x="987" y="200" width="80" height="26" rx="6"/>
  <text class="bs" x="1027" y="217" text-anchor="middle">faded</text>
  <text class="bs" x="940" y="248" text-anchor="middle">salience decays: active -&gt; dormant -&gt; faded</text>

  <!-- arrows -->
  <path class="link" d="M310,200 L416,200" marker-end="url(#arrow)"/>
  <text class="bs" x="363" y="190" text-anchor="middle">on a "sleep" cycle</text>
  <path class="link" d="M700,200 L796,200" marker-end="url(#arrow)"/>
  <text class="bs" x="748" y="190" text-anchor="middle">writes</text>

  <!-- recall loop -->
  <path class="link" d="M940,262 C940,372 185,372 185,250" marker-end="url(#arrow)"/>
  <text class="bs" x="560" y="366" text-anchor="middle">recall — salience-ranked: what currently matters, not everything ever recorded</text>

  <text x="560" y="448" text-anchor="middle" font-size="11.5" fill="#8a8a8a">People, projects, and context persist coherently across days instead of resetting each session.</text>
</svg>
