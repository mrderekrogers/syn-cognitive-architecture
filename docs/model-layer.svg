<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="545" viewBox="0 0 1120 545" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <rect x="0" y="0" width="1120" height="545" fill="#ffffff"/>

  <text x="560" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#1a1a1a">Model layer — one mind across five models on two nodes</text>
  <text x="560" y="64" text-anchor="middle" font-size="13.5" fill="#5a5a5a">Distinct functional roles coordinated over the bus; affect runs on its own node (split processing · differently-shaped affect)</text>

  <defs>
    <style>
      .grp { fill:#f4f7fb; stroke:#c9d6e8; stroke-width:1.5; }
      .glabel { fill:#1F3864; font-size:13.5px; font-weight:700; }
      .box { fill:#ffffff; stroke:#c9d6e8; stroke-width:1.5; }
      .bt { fill:#1a1a1a; font-size:13px; font-weight:600; }
      .bs { fill:#5a5a5a; font-size:11px; }
      .link { stroke:#9fb3cf; stroke-width:2; fill:none; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#9fb3cf"/>
    </marker>
  </defs>

  <!-- bus -->
  <rect x="60" y="96" width="1000" height="42" rx="9" fill="#1F3864"/>
  <text x="560" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Shared message bus  (publish / subscribe)</text>
  <path class="link" d="M300,138 L300,170" marker-end="url(#arrow)"/>
  <path class="link" d="M820,138 L820,170" marker-end="url(#arrow)"/>

  <!-- Node 1 -->
  <rect class="grp" x="70" y="170" width="470" height="222" rx="12"/>
  <text class="glabel" x="90" y="196">Node 1 — analytical hemisphere</text>
  <rect class="box" x="90" y="214" width="200" height="120" rx="8"/>
  <text class="bt" x="190" y="252" text-anchor="middle">Reasoning model</text>
  <text class="bs" x="190" y="274" text-anchor="middle">deep, multi-step cognition</text>
  <text class="bs" x="190" y="290" text-anchor="middle">runs the default-mode loop</text>
  <rect class="box" x="320" y="214" width="200" height="120" rx="8"/>
  <text class="bt" x="420" y="252" text-anchor="middle">Sensory gate / router</text>
  <text class="bs" x="420" y="274" text-anchor="middle">small &amp; fast</text>
  <text class="bs" x="420" y="290" text-anchor="middle">classifies + routes input</text>

  <!-- Node 2 -->
  <rect class="grp" x="580" y="170" width="470" height="222" rx="12"/>
  <text class="glabel" x="600" y="196">Node 2 — affective / expressive hemisphere</text>
  <rect class="box" x="600" y="214" width="205" height="80" rx="8"/>
  <text class="bt" x="702" y="244" text-anchor="middle">Conversational voice</text>
  <text class="bs" x="702" y="264" text-anchor="middle">mixture-of-experts (MoE)</text>
  <rect class="box" x="825" y="214" width="205" height="80" rx="8"/>
  <text class="bt" x="927" y="244" text-anchor="middle">Affect engine</text>
  <text class="bs" x="927" y="264" text-anchor="middle">produces the emotional state</text>
  <rect class="box" x="712" y="306" width="206" height="74" rx="8"/>
  <text class="bt" x="815" y="334" text-anchor="middle">Tool execution</text>
  <text class="bs" x="815" y="352" text-anchor="middle">runs the toolbelt</text>

  <!-- customization -->
  <rect class="grp" x="70" y="418" width="980" height="84" rx="12"/>
  <text class="bt" x="90" y="444" text-anchor="start">Customization — applied per user / per topic</text>
  <text class="bs" x="90" y="466" text-anchor="start">directional ablation · activation steering · composable LoRA adapters</text>
  <text class="bs" x="90" y="484" text-anchor="start">each model carries its own emotional "shape" — the same affect lands differently in different base models</text>
  <path class="link" d="M300,418 L300,394" marker-end="url(#arrow)"/>
  <path class="link" d="M820,418 L820,394" marker-end="url(#arrow)"/>

  <text x="560" y="528" text-anchor="middle" font-size="11.5" fill="#8a8a8a">Role-based view. The exact base models and the steering recipe (vectors, coefficients, layers) are kept private.</text>
</svg>
