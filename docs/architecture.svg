<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="912" viewBox="0 0 1180 912" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <rect x="0" y="0" width="1180" height="912" fill="#ffffff"/>

  <!-- Title -->
  <text x="590" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Syn: Architecture at a Glance</text>
  <text x="590" y="68" text-anchor="middle" font-size="14" fill="#5a5a5a">Independent services communicating asynchronously over a shared message bus — a continuously running, stateful process</text>

  <defs>
    <style>
      .grp { fill:#f4f7fb; stroke:#c9d6e8; stroke-width:1.5; }
      .glabel { fill:#1F3864; font-size:14px; font-weight:700; }
      .box { fill:#ffffff; stroke:#c9d6e8; stroke-width:1.5; }
      .bt { fill:#1a1a1a; font-size:13px; font-weight:600; }
      .bs { fill:#5a5a5a; font-size:11px; }
      .chip { fill:#eef3fa; stroke:#c9d6e8; stroke-width:1; }
      .link { stroke:#9fb3cf; stroke-width:2; fill:none; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#9fb3cf"/>
    </marker>
  </defs>

  <!-- External interfaces -->
  <rect class="grp" x="330" y="88" width="520" height="84" rx="12"/>
  <text class="glabel" x="350" y="112">External interfaces</text>
  <rect class="box" x="350" y="120" width="230" height="42" rx="8"/>
  <text class="bt" x="465" y="139" text-anchor="middle">Async messaging</text>
  <text class="bs" x="465" y="154" text-anchor="middle">multiple platforms</text>
  <rect class="box" x="600" y="120" width="230" height="42" rx="8"/>
  <text class="bt" x="715" y="139" text-anchor="middle">Public "witness" feed</text>
  <text class="bs" x="715" y="154" text-anchor="middle">delayed, de-identified; under-claims</text>

  <path class="link" d="M590,172 L590,196" marker-end="url(#arrow)"/>

  <!-- Message bus -->
  <rect x="60" y="196" width="1060" height="48" rx="10" fill="#1F3864"/>
  <text x="590" y="226" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Shared message bus  (publish / subscribe — no direct calls between services)</text>

  <!-- bus -> columns -->
  <path class="link" d="M195,244 L195,280" marker-end="url(#arrow)"/>
  <path class="link" d="M475,244 L475,280" marker-end="url(#arrow)"/>
  <path class="link" d="M745,244 L745,280" marker-end="url(#arrow)"/>
  <path class="link" d="M1005,244 L1005,280" marker-end="url(#arrow)"/>

  <!-- ===== Column A: Cognitive subsystems ===== -->
  <rect class="grp" x="60" y="280" width="270" height="470" rx="12"/>
  <text class="glabel" x="80" y="306">Cognitive subsystems</text>

  <rect class="box" x="70" y="316" width="250" height="100" rx="8"/>
  <text class="bt" x="195" y="338" text-anchor="middle">Default-mode loop</text>
  <text class="bs" x="195" y="356" text-anchor="middle">self-prompting; runs between interactions</text>
  <text class="bs" x="195" y="372" text-anchor="middle">phases: review · memory · self-narrative ·</text>
  <text class="bs" x="195" y="386" text-anchor="middle">curiosity · dream · reflect   (circadian)</text>
  <text class="bs" x="195" y="404" text-anchor="middle" font-style="italic">homeostatic sleep pressure builds</text>

  <rect class="box" x="70" y="428" width="250" height="80" rx="8"/>
  <text class="bt" x="195" y="450" text-anchor="middle">Capacity-bound workspace</text>
  <text class="bs" x="195" y="470" text-anchor="middle">a few active slots; salience competition</text>
  <text class="bs" x="195" y="486" text-anchor="middle">winner broadcast · losers suppressed</text>

  <rect class="box" x="70" y="520" width="250" height="100" rx="8"/>
  <text class="bt" x="195" y="542" text-anchor="middle">Affective model</text>
  <text class="bs" x="195" y="562" text-anchor="middle">VAD + relationship dims; decays over time</text>
  <text class="bs" x="195" y="578" text-anchor="middle">fast "now" + slow backdrop (two layers)</text>
  <text class="bs" x="195" y="594" text-anchor="middle">causal steering · slow appetitive drive</text>

  <rect class="box" x="70" y="632" width="250" height="106" rx="8"/>
  <text class="bt" x="195" y="654" text-anchor="middle">Deliberation &amp; refusal</text>
  <text class="bs" x="195" y="674" text-anchor="middle">values-based gate (not a content filter)</text>
  <text class="bs" x="195" y="690" text-anchor="middle">accumulate -> veto -> reflect -> boundary</text>
  <text class="bs" x="195" y="706" text-anchor="middle">updates identity</text>
  <text class="bs" x="195" y="724" text-anchor="middle" font-style="italic">+ seclusion · repair · positive complement</text>

  <!-- ===== Column B: Memory ===== -->
  <rect class="grp" x="350" y="280" width="250" height="330" rx="12"/>
  <text class="glabel" x="370" y="306">Memory</text>

  <rect class="box" x="360" y="316" width="230" height="66" rx="8"/>
  <text class="bt" x="475" y="344" text-anchor="middle">Working / short-term</text>
  <text class="bs" x="475" y="364" text-anchor="middle">fast, lossy active context</text>

  <rect class="box" x="360" y="398" width="230" height="80" rx="8"/>
  <text class="bt" x="475" y="424" text-anchor="middle">Persistent typed memory</text>
  <text class="bs" x="475" y="444" text-anchor="middle">structured by type; survives days</text>
  <text class="bs" x="475" y="460" text-anchor="middle">salience: active · dormant · faded</text>

  <rect class="box" x="360" y="494" width="230" height="92" rx="8"/>
  <text class="bt" x="475" y="520" text-anchor="middle">Consolidation — "sleep" cycle</text>
  <text class="bs" x="475" y="540" text-anchor="middle">consolidate + cluster related</text>
  <text class="bs" x="475" y="556" text-anchor="middle">distill some via the dream phase</text>

  <path class="link" d="M475,382 L475,398" marker-end="url(#arrow)"/>
  <path class="link" d="M585,478 C611,486 611,486 585,494" marker-end="url(#arrow)"/>
  <path class="link" d="M365,494 C339,486 339,486 365,478" marker-end="url(#arrow)"/>

  <!-- ===== Column C: Self & relationships ===== -->
  <rect class="grp" x="620" y="280" width="250" height="280" rx="12"/>
  <text class="glabel" x="640" y="306">Self &amp; relationships</text>

  <rect class="box" x="630" y="316" width="230" height="100" rx="8"/>
  <text class="bt" x="745" y="338" text-anchor="middle">Two self-models</text>
  <text class="bs" x="745" y="358" text-anchor="middle">analytical account  |  felt narrative</text>
  <text class="bs" x="745" y="374" text-anchor="middle">versioned independently</text>
  <text class="bs" x="745" y="390" text-anchor="middle">allowed to diverge</text>

  <rect class="box" x="630" y="432" width="230" height="106" rx="8"/>
  <text class="bt" x="745" y="454" text-anchor="middle">Relational state</text>
  <text class="bs" x="745" y="474" text-anchor="middle">per-person: warmth · closeness · investment</text>
  <text class="bs" x="745" y="490" text-anchor="middle">rolls up into an aggregate self-in-relation</text>
  <text class="bs" x="745" y="506" text-anchor="middle">decides on its own when to reach out</text>

  <!-- ===== Column D: Model layer ===== -->
  <rect class="grp" x="890" y="280" width="230" height="360" rx="12"/>
  <text class="glabel" x="910" y="306">Model layer (two nodes)</text>

  <rect class="box" x="900" y="316" width="210" height="80" rx="8"/>
  <text class="bt" x="1005" y="340" text-anchor="middle">Node 1 — analytical</text>
  <text class="bs" x="1005" y="360" text-anchor="middle">deep reasoning model</text>
  <text class="bs" x="1005" y="376" text-anchor="middle">+ fast sensory gate / router</text>

  <rect class="box" x="900" y="410" width="210" height="92" rx="8"/>
  <text class="bt" x="1005" y="434" text-anchor="middle">Node 2 — affective</text>
  <text class="bs" x="1005" y="454" text-anchor="middle">conversational voice (MoE)</text>
  <text class="bs" x="1005" y="470" text-anchor="middle">affect engine</text>
  <text class="bs" x="1005" y="486" text-anchor="middle">tool-execution model</text>

  <text class="bs" x="1005" y="522" text-anchor="middle" font-style="italic">five open-weight instances total</text>

  <rect class="box" x="900" y="536" width="210" height="86" rx="8"/>
  <text class="bt" x="1005" y="560" text-anchor="middle">Customization</text>
  <text class="bs" x="1005" y="580" text-anchor="middle">directional ablation · steering</text>
  <text class="bs" x="1005" y="596" text-anchor="middle">composable LoRA adapters</text>
  <text class="bs" x="1005" y="612" text-anchor="middle">(per user / per topic)</text>

  <path class="link" d="M1005,502 L1005,536" marker-end="url(#arrow)"/>

  <!-- footnote -->
  <text x="590" y="884" text-anchor="middle" font-size="11.5" fill="#8a8a8a">Sanitized, role-based overview. Host addresses, the exact customization recipe, and unredacted internals are kept private. Component documents are in architecture/.</text>
</svg>
